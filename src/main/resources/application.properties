spring.application.name=sos-orbit
server.port=8080

# Configure com o usuario criado no Oracle SQL Developer
spring.datasource.url=${DB_URL:jdbc:oracle:thin:@//localhost:1521/XEPDB1}
spring.datasource.username=${DB_USERNAME:sosorbit}
spring.datasource.password=${DB_PASSWORD:sosorbit}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect

springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
