services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: sosorbit-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  sosorbit-api:
    build: .
    container_name: sosorbit-api
    depends_on:
      - rabbitmq
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      APP_SOAP_RISCO_ORBITAL_URL: http://localhost:8081/risco-orbital
